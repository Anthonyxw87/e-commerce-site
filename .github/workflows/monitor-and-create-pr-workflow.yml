name: Monitor Deployments & Create PRD PR

on:
  repository_dispatch:
    types: [deployment-complete]

jobs:
  track-deployment-status:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout dev branch
        uses: actions/checkout@v4
        with:
          ref: dev
          token: ${{ secrets.PAT_TOKEN }}

      - name: Set up Git with PAT auth
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}


      - name: Load or create deploy-status.json
        id: status_file
        run: |
          mkdir -p .github/deploy-state
          STATUS_FILE=".github/deploy-state/deploy-status.json"
          
          if [ ! -f "$STATUS_FILE" ]; then
            echo '{"frontend": "", "backend": "", "database": ""}' > $STATUS_FILE
          fi

          cat $STATUS_FILE

      - name: Update component status
        run: |
          COMPONENT="${{ github.event.client_payload.component }}"
          STATUS="${{ github.event.client_payload.status }}"
          FILE=".github/deploy-state/deploy-status.json"

          jq --arg comp "$COMPONENT" --arg status "$STATUS" '.[$comp] = $status' "$FILE" > tmp.json && mv tmp.json "$FILE"

      - name: Commit and push updated status
        run: |
          git add .github/deploy-state/deploy-status.json
          git commit -m "Update ${{ github.event.client_payload.component }} deploy status to ${{ github.event.client_payload.status }}" || echo "No changes to commit"
          git push origin dev

      - name: Check if all components are successful
        id: check_all
        run: |
          FILE=".github/deploy-state/deploy-status.json"
          STATUS=$(jq -r '[.frontend, .backend, .database] | all(. == "success")' "$FILE")
          echo "all_success=$STATUS" >> $GITHUB_OUTPUT

      - name: Create PR to PRD
        if: steps.check_all.outputs.all_success == 'true'
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          gh pr create \
            -B prd -H dev \
            --title "Merge DEV → PRD (auto)" \
            --body "All components deployed successfully. This PR was auto-created by GitHub Actions."

      - name: Reset status after PR
        if: steps.check_all.outputs.all_success == 'true'
        run: |
          echo '{"frontend": "", "backend": "", "database": ""}' > .github/deploy-state/deploy-status.json
          git add .github/deploy-state/deploy-status.json
          git commit -m "Reset deployment status after PR to PRD"
          git push origin dev