name: Monitor Deployments & Create PRD PR

on:
  repository_dispatch:
    types: [deployment-complete]

jobs:
  track-deployment-status:
    runs-on: ubuntu-latest

    steps:
      - name: Update component status in repo variable
        run: |
          COMPONENT="${{ github.event.client_payload.component }}"
          STATUS="${{ github.event.client_payload.status }}"
          VAR_NAME="DEPLOY_STATUS_${COMPONENT^^}"  # Uppercase: frontend → DEPLOY_STATUS_FRONTEND

          curl -s -o /dev/null -w "%{http_code}" -X PATCH \
            -H "Authorization: Bearer ${{ secrets.PAT_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/variables/${VAR_NAME} \
            -d '{"name":"'"${VAR_NAME}"'","value":"'"${STATUS}"'"}' | grep -qE "200|204" || \
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.PAT_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/variables \
            -d '{"name":"'"${VAR_NAME}"'","value":"'"${STATUS}"'"}'

      - name: Check if all components deployed successfully
        id: check_all
        run: |
          get_status() {
            VAR_NAME="DEPLOY_STATUS_$1"
            curl -s -H "Authorization: Bearer ${{ secrets.PAT_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/repos/${{ github.repository }}/actions/variables/${VAR_NAME} |
              jq -r '.value'
          }

          FRONTEND=$(get_status FRONTEND)
          BACKEND=$(get_status BACKEND)
          DATABASE=$(get_status DATABASE)

          echo "Frontend: $FRONTEND, Backend: $BACKEND, Database: $DATABASE"

          if [[ "$FRONTEND" == "success" && "$BACKEND" == "success" && "$DATABASE" == "success" ]]; then
            echo "all_success=true" >> $GITHUB_OUTPUT
          else
            echo "all_success=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout dev branch
        if: steps.check_all.outputs.all_success == 'true'
        uses: actions/checkout@v4
        with:
          ref: dev
          token: ${{ secrets.PAT_TOKEN }}
          
      - name: Create PR to PRD
        if: steps.check_all.outputs.all_success == 'true'
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          gh pr create \
            -B prd -H dev \
            --title "Merge DEV → PRD (auto)" \
            --body "All components deployed successfully. This PR was auto-created by GitHub Actions."

      - name: Reset deployment variables after PR
        if: steps.check_all.outputs.all_success == 'true'
        run: |
          for VAR in FRONTEND BACKEND DATABASE; do
            curl -X PATCH \
              -H "Authorization: Bearer ${{ secrets.PAT_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/repos/${{ github.repository }}/actions/variables/DEPLOY_STATUS_$VAR \
              -d '{"name":"DEPLOY_STATUS_'"$VAR"'","value":""}'
          done
