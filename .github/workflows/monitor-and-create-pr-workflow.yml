name: Monitor Deployments & Create PRD PR

on:
  repository_dispatch:
    types: [deployment-complete]

env:
  ENVIRONMENT_NAME: deployment-state
  SECRET_NAME: DEPLOY_STATE

jobs:
  track-deployment-status:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout dev branch
        uses: actions/checkout@v4
        with:
          ref: dev
          token: ${{ secrets.PAT_TOKEN }}

      - name: Load deploy status from environment secret
        id: load_status
        run: |
          echo '${{ secrets.DEPLOY_STATE }}' > .github/deploy-state/deploy-status.json

      - name: Update component status
        run: |
          COMPONENT="${{ github.event.client_payload.component }}"
          STATUS="${{ github.event.client_payload.status }}"
          FILE=".github/deploy-state/deploy-status.json"

          jq --arg comp "$COMPONENT" --arg status "$STATUS" '.[$comp] = $status' "$FILE" > tmp.json && mv tmp.json "$FILE"

      - name: Check if all components are successful
        id: check_all
        run: |
          FILE=".github/deploy-state/deploy-status.json"
          STATUS=$(jq -r '[.frontend, .backend, .database] | all(. == "success")' "$FILE")
          echo "all_success=$STATUS" >> $GITHUB_OUTPUT

      - name: Create PR to PRD
        if: steps.check_all.outputs.all_success == 'true'
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          gh pr create \
            -B prd -H dev \
            --title "Merge DEV → PRD (auto)" \
            --body "All components deployed successfully. This PR was auto-created by GitHub Actions."

      - name: Reset status after PR
        if: steps.check_all.outputs.all_success == 'true'
        run: |
          echo '{"frontend": "", "backend": "", "database": ""}' > .github/deploy-state/deploy-status.json

      - name: Update GitHub Environment Secret
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          VALUE=$(cat .github/deploy-state/deploy-status.json | base64 | tr -d '\n')
          PUBLIC_KEY_RESPONSE=$(curl -s -H "Authorization: token $GH_TOKEN" \
            https://api.github.com/repos/${{ github.repository }}/environments/${{ env.ENVIRONMENT_NAME }}/secrets/public-key)

          KEY_ID=$(echo "$PUBLIC_KEY_RESPONSE" | jq -r '.key_id')
          KEY=$(echo "$PUBLIC_KEY_RESPONSE" | jq -r '.key')

          echo "$VALUE" | \
            openssl pkeyutl -encrypt -pubin -inkey <(echo "$KEY" | base64 -d) -out encrypted.bin

          ENCRYPTED_VALUE=$(base64 -w 0 encrypted.bin)

          curl -X PUT -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"encrypted_value\":\"$ENCRYPTED_VALUE\",\"key_id\":\"$KEY_ID\"}" \
            https://api.github.com/repos/${{ github.repository }}/environments/${{ env.ENVIRONMENT_NAME }}/secrets/${{ env.SECRET_NAME }}
