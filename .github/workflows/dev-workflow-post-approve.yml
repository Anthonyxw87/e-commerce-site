name: Dev Workflow Post-approve
on:
    pull_request:
        types: [locked]
    pull_request_review:
        types: [submitted]

env:
    REPO_NAME: "${{ github.repository }}"
    BRANCH_BASE: dev
    BRANCH_HEAD: ${{ github.ref_name }}

jobs:
    dev:
        if: startsWith(github.event.pull_request.base.ref, 'dev')
        permissions: write-all
        name: Deploy to DEV
        runs-on: ubuntu-latest
        timeout-minutes: 10

        steps:
            -   name: Checkout Repository
                uses: actions/checkout@v4
                with:
                    ref: ${{ github.event.pull_request.base.ref }}  ##DOUBLE CHECK HEAD (feature) / BASE (dev)


            -   name: Merge Feature -> DEV
                env:
                    PR_NUMBER: ${{ github.event.pull_request.number }}
                    GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                run: gh pr merge $PR_NUMBER --body "Merging feature -> dev..." --merge


            -   name: Repo Checkout (back to feature)
                uses: actions/checkout@v4.1.0
                with:
                    ref: ${{ github.event.pull_request.head.ref }}  ##DOUBLE CHECK HEAD (feature) / BASE (dev)


            -   name: Git pull from dev branch to align history, push back to feature origin
                env:
                    GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                run: |
                    git branch -a
                    git status
                    git pull origin dev
                    git push
                    git status


            -   name: Repo Checkout (newly merged code)
                uses: actions/checkout@v4.1.0
                with:
                    token: ${{ secrets.GITHUB_TOKEN }}
                    ref: ${{ github.event.pull_request.base.ref }}  ##DOUBLE CHECK HEAD (feature) / BASE (dev)


            -   name: Close Pull (always, fail/success)
                env:
                    PR_NUMBER: ${{ github.event.pull_request.number }}
                    GH_TOKEN: ${{ secrets.PAT_TOKEN }}
                if: failure()
                run: |
                    echo "PR closed due to error. See action logs for details."
                    gh pr close $PR_NUMBER --comment "Auto-closing pull request"

            -   name: Create pull request to PRD
                if: success()
                env:
                    GH_TOKEN: ${{ secrets.PAT_TOKEN }}
                run: gh pr create -r ${{ vars.FEATURE_PR_APPROVER }} -B prd -H dev --title 'Merge DEV branch into PRD branch' --body 'Auto-created by workflow'
                
            -   name: Trigger Backend Deploy Workflow
                if: success()
                env:
                    GH_TOKEN: ${{ secrets.PAT_TOKEN }}
                run: |
                    curl -X POST https://api.github.com/repos/${{ github.repository }}/dispatches \
                    -H "Accept: application/vnd.github+json" \
                    -H "Authorization: token $GH_TOKEN" \
                    -d '{"event_type": "trigger-backend-deploy", "client_payload": { "branch": "dev" }}'

            -   name: Trigger Frontend Deploy Workflow
                if: success()
                env:
                    GH_TOKEN: ${{ secrets.PAT_TOKEN }}
                run: |
                    curl -X POST https://api.github.com/repos/${{ github.repository }}/dispatches \
                    -H "Accept: application/vnd.github+json" \
                    -H "Authorization: token $GH_TOKEN" \
                    -d '{"event_type": "trigger-frontend-deploy", "client_payload": { "branch": "dev" }}'
